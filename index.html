<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>购物结算页</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --red:#FF2B2B;--red2:#FF6060;--orange:#FF6B00;
  --blue:#4A90D9;--gray:#F5F5F5;--gray2:#E8E8E8;--gray3:#BBBBBB;--gray4:#999;
  --dark:#1A1A1A;
}
body{font-family:'Noto Sans SC',sans-serif;background:#f0f0f0;min-height:100vh;}#admin,#checkout{max-width:520px;margin:0 auto;position:relative;}

/* ====== ADMIN ====== */
#admin{padding:16px;}
.a-card{background:#fff;border-radius:14px;padding:22px 18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);}
.a-head{font-size:18px;font-weight:900;color:var(--dark);margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.a-head .pill{background:linear-gradient(90deg,var(--red),var(--orange));color:#fff;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;}
.a-sub{font-size:12px;color:var(--gray4);margin-bottom:20px;}
.sec-label{font-size:13px;font-weight:700;color:var(--dark);padding:6px 0 12px;border-bottom:2px solid var(--gray2);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
.sec-label::before{content:'';width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--orange));flex-shrink:0;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg.full{grid-column:1/-1;}
label{font-size:12px;font-weight:600;color:#555;}
input[type=text],input[type=number],textarea,select{
  border:1.5px solid var(--gray2);border-radius:8px;
  padding:9px 12px;font-size:13px;font-family:inherit;color:var(--dark);
  outline:none;transition:border .2s;background:#fafafa;width:100%;
}
input:focus,textarea:focus{border-color:var(--red2);background:#fff;}
textarea{resize:vertical;min-height:60px;}

/* image upload */
.img-upload{
  border:2px dashed var(--gray2);border-radius:10px;
  min-height:90px;cursor:pointer;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;
  transition:border .2s;background:#fafafa;
}
.img-upload:hover{border-color:var(--red);}
.img-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-upload img{max-width:100%;max-height:120px;border-radius:6px;display:none;}
.img-upload .hint{font-size:12px;color:var(--gray4);}

/* tiers editor */
.tier-editor{display:flex;flex-direction:column;gap:8px;}
.tier-row-edit{display:flex;align-items:center;gap:8px;}
.tier-row-edit input{flex:1;}
.tier-row-edit .tier-del{
  width:28px;height:28px;border-radius:50%;border:none;background:var(--gray);
  color:var(--gray4);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
}
.tier-row-edit .tier-del:hover{background:#FFE0E0;color:var(--red);}
.add-tier-btn{
  border:1.5px dashed var(--gray2);border-radius:8px;background:transparent;
  padding:7px;font-size:12px;color:var(--gray4);cursor:pointer;
  transition:all .2s;width:100%;font-family:inherit;
}
.add-tier-btn:hover{border-color:var(--red);color:var(--red);}

/* service tags */
.tags-edit{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.tag-edit-item{display:flex;align-items:center;gap:3px;border:1px solid var(--gray2);border-radius:6px;padding:3px 8px;background:#fafafa;}
.tag-edit-item input{border:none;background:transparent;font-size:11px;padding:0;width:72px;}
.tag-edit-item input:focus{outline:none;}
.tag-edit-item .tdel{cursor:pointer;color:var(--gray3);font-size:15px;}
.tag-edit-item .tdel:hover{color:var(--red);}
.tag-add{border:1.5px dashed var(--gray2);border-radius:6px;background:transparent;padding:3px 10px;font-size:11px;color:var(--gray4);cursor:pointer;transition:all .2s;}
.tag-add:hover{border-color:var(--red);color:var(--red);}

.gen-btn{
  width:100%;padding:15px;
  background:linear-gradient(90deg,var(--red),var(--red2));
  color:#fff;font-size:16px;font-weight:700;border:none;border-radius:12px;
  cursor:pointer;font-family:inherit;letter-spacing:.5px;
  box-shadow:0 4px 18px rgba(255,43,43,.35);transition:all .2s;
}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(255,43,43,.45);}
.gen-btn:active{transform:scale(.98);}

/* ====== CHECKOUT ====== */
#checkout{display:none;}

.topbar{
  background:#fff;display:flex;align-items:center;
  padding:14px 16px;position:relative;
  border-bottom:1px solid var(--gray2);
}
.back-btn{font-size:22px;color:var(--dark);cursor:pointer;margin-right:10px;}
.topbar-title{font-size:17px;font-weight:700;color:var(--dark);flex:1;text-align:center;}
.av-group{display:flex;align-items:center;}
.av{width:26px;height:26px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700;margin-left:-6px;}
.av:first-child{margin-left:0;background:linear-gradient(135deg,#4facfe,#00f2fe);}
.av:nth-child(2){background:linear-gradient(135deg,#f093fb,#f5576c);}
.av-count{font-size:13px;color:var(--gray4);margin-left:6px;}

.sec{background:#fff;margin:8px 0;padding:0 16px;}
.shop-row{display:flex;align-items:center;padding:13px 0 10px;border-bottom:1px solid var(--gray);}
.shop-name{font-size:14px;font-weight:700;color:var(--dark);}
.shop-badge{background:linear-gradient(90deg,#FE2C55,#FF6B35);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;margin-left:7px;}

.prod-row{display:flex;gap:12px;padding:12px 0;}
.prod-img{
  width:90px;height:90px;border-radius:10px;
  background:linear-gradient(135deg,#FFF0F5,#FFE0EA);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:32px;overflow:hidden;
}
.prod-img img{width:100%;height:100%;object-fit:cover;display:none;}
.prod-info{flex:1;display:flex;flex-direction:column;justify-content:space-between;}
.prod-badge-row{display:flex;gap:5px;margin-bottom:4px;}
.tag-global-inline{background:#7B2FF7;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;white-space:nowrap;vertical-align:middle;margin-right:4px;display:inline-block;line-height:1.6;}
.tag-tax{background:#f5f5f5;color:#999;font-size:10px;padding:1px 7px;border-radius:4px;white-space:nowrap;border:1px solid #e8e8e8;}
.tax-line{font-size:11px;color:#aaa;margin:4px 0 5px;display:flex;align-items:center;gap:3px;}
.prod-badge-tag{background:#FFF0F0;border:1px solid #FFD0D0;color:var(--red);font-size:10px;padding:1px 6px;border-radius:3px;}
.prod-title-text{font-size:13px;color:var(--dark);line-height:1.45;}
.prod-tags-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.tag-blue{border:1px solid var(--blue);color:var(--blue);font-size:10px;padding:1px 6px;border-radius:3px;}
.tag-tax-inline{border:1px solid #ddd;color:#999;font-size:10px;padding:1px 6px;border-radius:3px;background:#fafafa;}

.prod-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.price-col{}
.price-now{font-size:18px;font-weight:700;color:var(--red);}
.price-now sup{font-size:12px;font-weight:400;}
.price-orig{font-size:11px;color:var(--gray4);text-decoration:line-through;margin-top:1px;}

.qty-ctrl{display:flex;align-items:center;}
.qbtn{width:28px;height:28px;border:1.5px solid var(--gray2);background:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--dark);cursor:pointer;user-select:none;transition:all .15s;}
.qbtn:first-child{border-radius:6px 0 0 6px;}
.qbtn:last-child{border-radius:0 6px 6px 0;}
.qbtn:active{background:var(--gray);}
.qbtn.dim{color:var(--gray3);}
.qnum{min-width:36px;height:28px;border:1.5px solid var(--gray2);border-left:none;border-right:none;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:var(--dark);transition:transform .15s;}
.qnum.pop{transform:scale(1.3);}

/* tier banner */
.tier-banner{
  background:linear-gradient(90deg,#FFF8F0,#FFF3E8);border:1px solid #FFD9B3;border-radius:10px;
  padding:10px 14px;margin:8px 0 6px;display:flex;align-items:center;gap:8px;
}
.tier-fire{font-size:18px;}
.tier-text{flex:1;}
.tier-main-txt{font-size:13px;font-weight:700;color:var(--orange);}
.tier-sub-txt{font-size:11px;color:#B36000;margin-top:2px;}
.tier-prog{width:100%;height:5px;background:var(--gray2);border-radius:3px;margin-top:8px;overflow:hidden;}
.tier-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--orange),#FF3C00);transition:width .4s cubic-bezier(.34,1.56,.64,1);}

.tiers-chips{display:flex;gap:6px;padding:6px 0 14px;overflow-x:auto;scrollbar-width:none;}
.tiers-chips::-webkit-scrollbar{display:none;}
.tchip{
  flex-shrink:0;border:1.5px solid var(--gray2);border-radius:8px;
  padding:7px 12px;text-align:center;background:#fff;min-width:76px;
}
.tchip.active{border-color:var(--red);background:linear-gradient(135deg,#FFF5F5,#FFE8E8);box-shadow:0 2px 8px rgba(255,43,43,.15);}
.tchip .tc-qty{font-size:10px;color:var(--gray4);}
.tchip.active .tc-qty{color:var(--red);}
.tchip .tc-disc{font-size:13px;font-weight:700;color:var(--dark);margin:2px 0;}
.tchip.active .tc-disc{color:var(--red);}
.tchip .tc-lbl{font-size:10px;color:var(--gray4);}
.tchip.active .tc-lbl{color:var(--red);}

.del-row{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--gray);font-size:13px;gap:14px;}
.del-row:last-child{border-bottom:none;}
.del-label{color:var(--gray4);width:60px;flex-shrink:0;}
.del-val{flex:1;color:var(--dark);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.tag-free{background:#FFF8E6;border:1px solid #FFD966;color:#C68900;font-size:10px;padding:1px 6px;border-radius:3px;}
.tag-presale{background:var(--red);color:#fff;font-size:10px;padding:2px 6px;border-radius:3px;}
.del-arrow{color:var(--gray3);font-size:15px;}

.remark-wrap{background:#fff;padding:14px 16px;margin:8px 0;}
.remark-lbl{font-size:13px;color:var(--gray4);margin-bottom:8px;}
.remark-ta{width:100%;border:1.5px solid var(--gray2);border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;color:var(--dark);resize:none;outline:none;background:#FAFAFA;transition:border .2s;}
.remark-ta:focus{border-color:var(--red2);background:#fff;}

.price-detail{background:#fff;padding:14px 16px;margin:8px 0;}
.pd-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;}
.pd-lbl{color:var(--gray4);}
.pd-val{color:var(--dark);}
.pd-val.red{color:var(--red);font-weight:600;}
.pd-total{border-top:1px solid var(--gray2);margin-top:6px;padding-top:10px;}
.pd-total .pd-lbl{font-size:15px;font-weight:700;color:var(--dark);}
.pd-total .pd-val{font-size:19px;font-weight:900;color:var(--red);}

.spacer{height:0;}
.bottom-bar{display:none;}
.pay-btn-full{
  width:100%;padding:16px;
  background:linear-gradient(90deg,var(--red),var(--red2));
  color:#fff;font-size:16px;font-weight:700;
  border:none;border-radius:100px;cursor:pointer;
  font-family:inherit;letter-spacing:.5px;
  box-shadow:0 4px 16px rgba(255,43,43,.35);
  transition:all .2s;
  animation:breathe 2.5s ease-in-out infinite;
}
.pay-btn-full:active{transform:scale(.98);animation:none;}
@keyframes pulse-once{0%{transform:scale(1);}50%{transform:scale(1.04);box-shadow:0 8px 28px rgba(255,43,43,.7);}100%{transform:scale(1);}}
@keyframes breathe{
  0%,100%{box-shadow:0 4px 16px rgba(255,43,43,.35);transform:scale(1);}
  50%{box-shadow:0 6px 24px rgba(255,43,43,.6);transform:scale(1.012);}
}



/* success */
.suc-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.suc-overlay.show{display:flex;animation:fadeIn .2s;}
.suc-card{background:#fff;border-radius:22px;padding:38px 30px;text-align:center;width:290px;animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
.suc-icon{width:76px;height:76px;margin:0 auto 14px;border-radius:50%;background:linear-gradient(135deg,#52c41a,#73d13d);display:flex;align-items:center;justify-content:center;font-size:38px;}
.suc-h{font-size:20px;font-weight:900;color:var(--dark);margin-bottom:6px;}
.suc-amt{font-size:30px;font-weight:900;color:var(--red);margin:8px 0;}
.suc-desc{font-size:13px;color:var(--gray4);line-height:1.7;margin-bottom:22px;}
.suc-btn{width:100%;padding:13px;border-radius:100px;background:linear-gradient(90deg,var(--red),var(--red2));color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;}
.suc-btn:active{transform:scale(.97);}

@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes popIn{from{opacity:0;transform:scale(.7);}to{opacity:1;transform:scale(1);}}
</style>
</head>
<body>

<!-- ======= ADMIN ======= -->
<div id="admin">
  <div class="a-card">
    <div class="a-head">🛒 结算页设置 <span class="pill">编辑模式</span></div>
    <div class="a-sub">填好内容后点「生成结算页」，直接得到可分享的购物页面</div>

    <div class="sec-label">店铺 & 商品</div>
    <div class="grid2">
      <div class="fg"><label>店铺名称</label><input type="text" id="a-shop" value="MegaRed 海外旗舰店"></div>
      <div class="fg full"><label>商品标题</label><textarea id="a-title">MegaRed脉拓南极深海磷虾油500mg升级80粒ML</textarea></div>
      <div class="fg"><label>商品规格说明</label><input type="text" id="a-spec" value="500mg*80粒/瓶"></div>
    </div>

    <div class="sec-label" style="margin-top:18px">商品图片</div>
    <div class="img-upload" id="img-upload-box">
      <img id="img-preview" src="" alt="">
      <div class="hint">📷 点击上传商品图片</div>
      <input type="file" accept="image/*" onchange="handleImg(this)">
    </div>

    <div class="sec-label" style="margin-top:18px">价格</div>
    <div class="grid2">
      <div class="fg"><label>单价（¥）</label><input type="number" id="a-price" value="309" step="0.01" min="0"></div>
      <div class="fg"><label>原价/划线价（¥）</label><input type="number" id="a-orig" value="398" step="0.01" min="0"></div>
    </div>

    <div class="sec-label" style="margin-top:18px">🎯 阶梯优惠设置（数量越多减越多）</div>
    <div class="tier-editor" id="tier-editor"></div>
    <button class="add-tier-btn" onclick="addTierRow()" style="margin-top:8px">+ 添加优惠档位</button>

    <div class="sec-label" style="margin-top:18px">服务标签</div>
    <div class="tags-edit" id="service-tags">
      <div class="tag-edit-item"><input type="text" value="不支持7天无理由"><span class="tdel" onclick="this.parentElement.remove()">×</span></div>
      <div class="tag-edit-item"><input type="text" value="极速退款"><span class="tdel" onclick="this.parentElement.remove()">×</span></div>
      <div class="tag-edit-item"><input type="text" value="晚发即赔"><span class="tdel" onclick="this.parentElement.remove()">×</span></div>
    </div>
    <button class="tag-add" onclick="addServiceTag()" style="margin-top:8px">+ 添加标签</button>

    <div class="sec-label" style="margin-top:18px">物流信息</div>
    <div class="grid2">
      <div class="fg"><label>配送说明</label><input type="text" id="a-ship" value="包邮，赠运费险"></div>
      <div class="fg"><label>发货说明</label><input type="text" id="a-delivery" value="现货 48小时内发货"></div>
    </div>
  </div>

  <div class="a-card">
    <button class="gen-btn" onclick="generate()">🚀 生成结算页</button>
  </div>
</div>

<!-- ======= CHECKOUT ======= -->
<div id="checkout">
  <div class="topbar">
    <span class="back-btn" onclick="backEdit()">‹</span>
    <span class="topbar-title">确认订单</span>
  </div>

  <div class="sec">
    <div class="shop-row">
      <span class="shop-name" id="p-shop"></span>
      
    </div>
    <div class="prod-row">
      <div class="prod-img" id="p-imgbox"><img id="p-img" src="" alt=""><span id="p-emoji">💊</span></div>
      <div class="prod-info">
        <div>
          <div class="prod-title-text" id="p-title"><span class="tag-global-inline">全球购</span><span id="p-title-text"></span></div>
          <div class="prod-tags-row" id="p-tags"></div>
        </div>
        <div class="prod-bottom">
          <div class="price-col">
            <div class="price-now"><sup>¥</sup><span id="p-price"></span></div>
            <div class="price-orig" id="p-orig"></div>
          </div>
          <div class="qty-ctrl">
            <div class="qbtn dim" id="btn-minus" onclick="changeQty(-1)">−</div>
            <div class="qnum" id="qty-num">1</div>
            <div class="qbtn" onclick="changeQty(1)">+</div>
          </div>
        </div>
      </div>
    </div>


  </div>

  <div class="sec">
    <div class="del-row">
      <span class="del-label">配送服务</span>
      <span class="del-val"><span id="p-ship"></span>&nbsp;·&nbsp;<span id="p-delivery"></span></span>
      <span class="del-arrow">›</span>
    </div>
  </div>

  <div class="sec" style="padding:12px 16px;">
    <button class="pay-btn-full" onclick="pay()">共减 <span id="bl-save"></span>，立即支付 ¥<span id="bl-total"></span></button>
  </div>
  </div>


</div>

<!-- success -->
<div class="suc-overlay" id="suc">
  <div class="suc-card">
    <div class="suc-icon">✓</div>
    <div class="suc-h">支付成功 🎉</div>
    <div class="suc-amt" id="suc-amt"></div>
    <div class="suc-desc">订单已提交，商家将在5天内发货<br>请注意查收物流信息～</div>
    <button class="suc-btn" onclick="document.getElementById('suc').classList.remove('show')">查看订单</button>
  </div>
</div>

<script>
// ---- state ----
let qty = 1;
let UNIT_PRICE = 49.50;
let ORIG_PRICE = 99.00;
let TIERS = [];
let imgData = null;

// ---- Default tiers ----
const DEFAULT_TIERS = [
  {qty:1, disc:8},
  {qty:2, disc:18},
  {qty:3, disc:30},
  {qty:5, disc:55},
  {qty:8, disc:100},
];

function buildAdminTiers() {
  const c = document.getElementById('tier-editor');
  c.innerHTML = '';
  DEFAULT_TIERS.forEach(t => addTierRow(t.qty, t.disc));
}

function addTierRow(q='', d='') {
  const c = document.getElementById('tier-editor');
  const row = document.createElement('div');
  row.className = 'tier-row-edit';
  row.innerHTML = `
    <input type="number" min="1" placeholder="购买数量" value="${q}" style="max-width:110px">
    <span style="font-size:13px;color:#555;white-space:nowrap">件 减</span>
    <input type="number" min="0" step="0.01" placeholder="优惠金额" value="${d}" style="max-width:110px">
    <span style="font-size:13px;color:#555">元</span>
    <button class="tier-del" onclick="this.parentElement.remove()">×</button>
  `;
  c.appendChild(row);
}

function addServiceTag() {
  const c = document.getElementById('service-tags');
  const div = document.createElement('div');
  div.className = 'tag-edit-item';
  div.innerHTML = '<input type="text" placeholder="标签内容"><span class="tdel" onclick="this.parentElement.remove()">×</span>';
  c.appendChild(div);
}

function handleImg(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    imgData = e.target.result;
    const img = document.getElementById('img-preview');
    img.src = imgData; img.style.display = 'block';
    document.querySelector('#img-upload-box .hint').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function g(id) { return document.getElementById(id).value.trim(); }

function generate() {
  // read tiers
  TIERS = [];
  document.querySelectorAll('#tier-editor .tier-row-edit').forEach(row => {
    const inputs = row.querySelectorAll('input');
    const q = parseInt(inputs[0].value);
    const d = parseFloat(inputs[1].value);
    if (!isNaN(q) && !isNaN(d) && q > 0) TIERS.push({qty:q, disc:d});
  });
  TIERS.sort((a,b) => a.qty - b.qty);
  if (!TIERS.length) { alert('请至少设置一个优惠档位！'); return; }

  UNIT_PRICE = parseFloat(g('a-price')) || 49.50;
  ORIG_PRICE = parseFloat(g('a-orig')) || 99.00;
  qty = 1;

  // fill checkout fields
  document.getElementById('p-shop').textContent = g('a-shop');
  document.getElementById('p-title-text').textContent = ' ' + g('a-title');
  document.getElementById('p-price').textContent = UNIT_PRICE.toFixed(2);
  document.getElementById('p-orig').textContent = ORIG_PRICE > UNIT_PRICE ? '¥' + ORIG_PRICE.toFixed(2) : '';
  document.getElementById('p-ship').innerHTML = `<span class="tag-free">包邮</span>${g('a-ship').replace('包邮，','').replace('包邮,','')}`;
  const delTxt = g('a-delivery');
  document.getElementById('p-delivery').innerHTML = `<span class="tag-presale">现货</span>${delTxt.replace('现货','').replace('预售','').trim()}`;

  // service tags
  const tagsEl = document.getElementById('p-tags');
  tagsEl.innerHTML = '';
  // 固定第一个：进口税
  const taxTag = document.createElement('span');
  taxTag.className = 'tag-tax-inline';
  taxTag.textContent = 'ⓘ 已含进口税';
  tagsEl.appendChild(taxTag);
  document.querySelectorAll('#service-tags .tag-edit-item input').forEach(inp => {
    if (inp.value.trim()) {
      const s = document.createElement('span');
      s.className = 'tag-blue';
      s.textContent = inp.value.trim();
      tagsEl.appendChild(s);
    }
  });

  // image
  if (imgData) {
    document.getElementById('p-img').src = imgData;
    document.getElementById('p-img').style.display = 'block';
    document.getElementById('p-emoji').style.display = 'none';
  } else {
    document.getElementById('p-img').style.display = 'none';
    document.getElementById('p-emoji').style.display = 'block';
  }

  updateCheckout();

  document.getElementById('admin').style.display = 'none';
  document.getElementById('checkout').style.display = 'block';
  window.scrollTo(0,0);
}

function backEdit() {
  document.getElementById('checkout').style.display = 'none';
  document.getElementById('admin').style.display = 'block';
  window.scrollTo(0,0);
}

function getCurrentTier() {
  let t = TIERS[0];
  TIERS.forEach(tier => { if (qty >= tier.qty) t = tier; });
  return t;
}
function getNextTier() {
  return TIERS.find(t => t.qty > qty) || null;
}

function updateCheckout() {
  const tier = getCurrentTier();
  const next = getNextTier();
  const origTotal = ORIG_PRICE * qty;
  const unitSaving = (ORIG_PRICE - UNIT_PRICE) * qty;
  const totalDisc = unitSaving + tier.disc;
  const toPay = Math.max(0, origTotal - totalDisc);

  document.getElementById('qty-num').textContent = qty;
  document.getElementById('bl-save').textContent = '¥' + totalDisc.toFixed(2);
  document.getElementById('bl-total').textContent = toPay.toFixed(2);

  // banner
  if (next) {
    const need = next.qty - qty;
  } else {
  }

  const maxQ = TIERS[TIERS.length-1].qty;

  TIERS.forEach(t => {
    const el = document.getElementById('chip-' + t.qty);
    if (el) el.classList.toggle('active', t.qty === tier.qty);
  });

  document.getElementById('btn-minus').classList.toggle('dim', qty <= 1);
}

function changeQty(d) {
  const n = qty + d;
  if (n < 1) return;
  qty = n;
  const el = document.getElementById('qty-num');
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 200);
  // pulse pay button
  const btn = document.querySelector('.pay-btn-full');
  btn.style.animation = 'none';
  void btn.offsetWidth;
  btn.style.animation = 'pulse-once 0.4s ease, breathe 2.5s ease-in-out 0.4s infinite';
  updateCheckout();
}

function pay() {
  document.getElementById('suc-amt').textContent = '¥' + document.getElementById('bl-total').textContent;
  document.getElementById('suc').classList.add('show');
}

buildAdminTiers();
</script>
